<!DOCTYPE html><html>
<head>
<meta charset="utf-8">
<title>AI预测系统</title>
<style>
body{
  margin:0;
  font-family:Arial;
  background:#0d0d0d;
  color:#fff;
}
.header{
  background:#00ffcc;
  color:#000;
  padding:15px;
  text-align:center;
  font-size:20px;
}
.card{
  margin:15px;
  padding:15px;
  background:#1a1a1a;
  border-radius:10px;
}
.main{
  font-size:26px;
  color:#00ffcc;
}
.sub{
  color:#ffaa00;
}
.footer{
  text-align:center;
  font-size:12px;
  color:#888;
}
</style>
</head><body><div class="header">🚀 AI智能预测系统</div><div class="card">
期号：<span id="issue">加载中...</span>
</div><div class="card">
<div class="main" id="main"></div>
<div class="sub" id="sub"></div>
</div><div class="card">
命中率：<span id="rate"></span>
</div><div class="footer">M15商业版系统</div><script>

let nums = [2,3,5,6,8,9];

function run(){

  let shuffled = nums.sort(()=>Math.random()-0.5);

  let main = shuffled.slice(0,3);
  let sub = shuffled.slice(3,6);

  document.getElementById("issue").innerText = "2026"+Math.floor(Math.random()*1000);

  document.getElementById("main").innerHTML = "🔥 主压："+main.join(",");
  document.getElementById("sub").innerHTML = "防守："+sub.join(",");

  document.getElementById("rate").innerText = (70+Math.random()*10).toFixed(1)+"%";
}

run();
setInterval(run,60000);

</script></body>
</html>
