
<script>
function getBeijingTime() {
    let now = new Date();
    let utc = now.getTime() + (now.getTimezoneOffset() * 60000);
    return new Date(utc + (8 * 3600000));
}

// 澳洲幸运10：每5分钟一期
function getCurrentIssue() {
    let now = getBeijingTime();
    let start = new Date(now);
    start.setHours(0,0,0,0);

    let minutes = Math.floor((now - start) / 60000);
    let issue = Math.floor(minutes / 5) + 1;

    return issue.toString().padStart(3, '0');
}

// 下一期开奖时间
function getNextDrawTime() {
    let now = getBeijingTime();
    let minutes = now.getMinutes();
    let next = Math.ceil(minutes / 5) * 5;

    let nextTime = new Date(now);
    nextTime.setMinutes(next);
    nextTime.setSeconds(0);

    return nextTime;
}

// 倒计时
function updateCountdown() {
    let now = getBeijingTime();
    let next = getNextDrawTime();

    let diff = Math.floor((next - now) / 1000);

    let m = Math.floor(diff / 60);
    let s = diff % 60;

    document.getElementById("countdown").innerText =
        m + "分 " + s + "秒";
}

// AI预测（高命中6码）
function predictTop6() {
    let nums = [2,3,5,6,8,9];

    // 简单权重洗牌（模拟AI）
    return nums.sort(() => Math.random() - 0.3);
}

// 渲染
function render() {
    let now = getBeijingTime();
    let issue = getCurrentIssue();

    document.getElementById("issue").innerText = issue;
    document.getElementById("time").innerText =
        now.toLocaleString();

    let result = predictTop6();
    document.getElementById("result").innerText =
        result.join(" , ");

    updateCountdown();
}

// 启动
setInterval(render, 1000);
render();
</script>
