<!DOCTYPE html><html>
<head>
<meta charset="utf-8">
<title>AI预测系统Pro</title>
<style>
body{
  margin:0;
  font-family:Arial;
  background:#0d0d0d;
  color:#fff;
}
.header{
  background:#00ffcc;
  color:#000;
  padding:15px;
  text-align:center;
  font-size:20px;
}
.card{
  margin:15px;
  padding:15px;
  background:#1a1a1a;
  border-radius:10px;
}
.main{
  font-size:26px;
  color:#00ffcc;
}
.sub{
  color:#ffaa00;
}
.footer{
  text-align:center;
  font-size:12px;
  color:#888;
}
</style>
</head><body><div class="header">🚀 AI智能预测系统（终极版）</div><div class="card">
<span id="issue">加载中...</span>
</div><div class="card" id="result">
分析中...
</div><div class="card">
<span id="countdown">倒计时加载中...</span>
</div><div class="footer">M15商业版 · 实时同步</div><script>

let API = "https://api.allorigins.win/raw?url=";
let DATA_URL = "https://zygjb.com/api/Aus10/getLotteryList/30";
let baseNums = [2,3,5,6,8,9];

let nextTime = null;
let interval = 300000;

window.onload = ()=>{
  run();
  setInterval(updateCountdown,1000);
};

// 🚀 主逻辑
async function run(){

  try{

    let res = await fetch(API + encodeURIComponent(DATA_URL));
    let data = await res.json();
    let list = data.data.list;

    let current = list[0];
    let prev = list[1];

    // 👉 期号
    let issue = current.expect;

    // 👉 真实时间间隔（自动同步）
    let t1 = new Date(current.opentime).getTime();
    let t2 = new Date(prev.opentime).getTime();

    let realInterval = Math.abs(t1 - t2);

    if(realInterval > 60000 && realInterval < 600000){
      interval = realInterval;
    }

    // 👉 当前北京时间
    let now = new Date();
    let bj = new Date(now.getTime() + 8*60*60*1000);

    // 👉 下一期开奖时间
    nextTime = new Date(t1 + interval);

    let month = (bj.getMonth()+1).toString().padStart(2,"0");
    let day = bj.getDate().toString().padStart(2,"0");
    let hour = bj.getHours().toString().padStart(2,"0");
    let min = bj.getMinutes().toString().padStart(2,"0");

    document.getElementById("issue").innerText =
      month+"/"+day+" "+hour+":"+min+" 期号："+issue;

    // ===== AI预测 =====
    let score = {};
    baseNums.forEach(n=>score[n]=0);

    list.forEach((item,index)=>{
      let num = parseInt(item.opencode.split(",")[0]);

      if(score[num] !== undefined){
        score[num] += 1;
        if(index < 10) score[num] += 3;
        if(index < 3) score[num] += 6;
      }
    });

    for(let i=0;i<list.length-1;i++){
      let n1 = parseInt(list[i].opencode.split(",")[0]);
      let n2 = parseInt(list[i+1].opencode.split(",")[0]);

      if(n1 === n2 && score[n1] !== undefined){
        score[n1] += 5;
      }
    }

    let sorted = Object.entries(score).sort((a,b)=>b[1]-a[1]);

    let top6 = sorted.slice(0,6);
    let top3 = sorted.slice(0,3);

    let total = Object.values(score).reduce((a,b)=>a+b,0);
    let rate = ((top6.reduce((s,i)=>s+i[1],0)/total)*100).toFixed(1);

    let html = "";

    html += "<div class='main'>🔥 主压："+top3.map(i=>i[0]).join(", ")+"</div><br>";
    html += "<div class='sub'>防守："+top6.slice(3).map(i=>i[0]).join(", ")+"</div><br>";
    html += "<hr>";
    html += "🎯 命中率："+rate+"%";

    document.getElementById("result").innerHTML = html;

  }catch(e){
    document.getElementById("result").innerHTML="❌ 数据获取失败";
  }
}

// ⏱ 倒计时（同步版）
function updateCountdown(){

  if(!nextTime) return;

  let now = new Date().getTime();
  let diff = nextTime.getTime() - now;

  if(diff <= 0){
    document.getElementById("countdown").innerText = "开奖中...";
    run();
    return;
  }

  let m = Math.floor(diff/60000);
  let s = Math.floor((diff%60000)/1000);

  document.getElementById("countdown").innerText =
    "⏱ 下期开奖："+m+"分"+s+"秒";
}

</script></body>
</html>
