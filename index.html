<!DOCTYPE html><html>
<head>
<meta charset="utf-8">
<title>幸运10 AI分析系统</title>
<style>
body{
  font-family: Arial;
  background:#111;
  color:#fff;
  text-align:center;
  padding:20px;
}
h1{
  color:#00ffcc;
}
.box{
  background:#222;
  padding:20px;
  border-radius:10px;
  margin-top:20px;
}
button{
  padding:10px 20px;
  font-size:18px;
  background:#00ffcc;
  border:none;
  border-radius:5px;
}
</style>
</head><body><h1>🚀 幸运10 AI分析系统</h1><div class="box">
  <p>点击下方按钮开始预测</p>
  <button onclick="run()">开始分析</button>
</div><div class="box" id="result">
  预测结果将在这里显示...
</div><script>
function run(){
  let nums = [2,3,5,6,8,9];
  let pick = nums[Math.floor(Math.random()*nums.length)];
  document.getElementById("result").innerHTML = "预测数字："+pick;
}
</script></body>
</html>
